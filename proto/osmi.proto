syntax = "proto3";

package osmi;

option go_package = "github.com/osmitickets-stack/osmi-protobuf/gen/pb;pb";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service OsmiService {
  // =========================
  // PAYMENTS
  // =========================
  rpc CreatePaymentIntent(CreatePaymentIntentRequest) returns (PaymentIntentResponse) {
    option (google.api.http) = {
      post: "/v1/payments/intent"
      body: "*"
    };
  }

  rpc CreatePayment(CreatePaymentRequest) returns (PaymentProcessingResponse) {
    option (google.api.http) = {
      post: "/v1/payments"
      body: "*"
    };
  }

  rpc ProcessOrder(ProcessOrderRequest) returns (Empty) {
    option (google.api.http) = {
      post: "/v1/payments/process-order"
      body: "*"
    };
  }

  rpc HandleWebhook(WebhookRequest) returns (Empty) {
    option (google.api.http) = {
      post: "/v1/webhooks/stripe"
      body: "*"
    };
  }

  // =========================
  // HEALTH
  // =========================
  rpc HealthCheck(Empty) returns (HealthResponse) {
    option (google.api.http) = {
      get: "/v1/health"
    };
  }

  // =========================
  // ORDERS
  // =========================
  rpc CreateOrder(CreateOrderRequest) returns (OrderResponse) {
    option (google.api.http) = {
      post: "/v1/orders"
      body: "*"
    };
  }

  // =========================
  // AUTH
  // =========================
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }

  rpc Logout(LogoutRequest) returns (Empty) {
    option (google.api.http) = {
      post: "/v1/auth/logout"
      body: "*"
    };
  }

  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
    option (google.api.http) = {
      post: "/v1/auth/refresh"
      body: "*"
    };
  }

  // =========================
  // USERS
  // =========================
  rpc CreateUser(CreateUserRequest) returns (UserResponse) {
    option (google.api.http) = {
      post: "/v1/users"
      body: "*"
    };
  }

  rpc GetUser(GetUserRequest) returns (UserResponse) {
    option (google.api.http) = {
      get: "/v1/users/{user_id}"
    };
  }

  rpc UpdateUser(UpdateUserRequest) returns (UserResponse) {
    option (google.api.http) = {
      patch: "/v1/users/{user_id}"
      body: "*"
    };
  }

  rpc DeleteUser(DeleteUserRequest) returns (Empty) {
    option (google.api.http) = {
      delete: "/v1/users/{user_id}"
    };
  }

    rpc ListUsers(ListUsersRequest) returns (UserListResponse) {
    option (google.api.http) = {
      get: "/v1/users"
    };
  }

  // =========================
  // CUSTOMERS
  // =========================
  rpc CreateCustomer(CreateCustomerRequest) returns (CustomerResponse) {
    option (google.api.http) = {
      post: "/v1/customers"
      body: "*"
    };
  }

  rpc GetCustomer(GetCustomerRequest) returns (CustomerResponse) {
    option (google.api.http) = {
      get: "/v1/customers/{public_id}"
    };
  }

  rpc UpdateCustomer(UpdateCustomerRequest) returns (CustomerResponse) {
    option (google.api.http) = {
      patch: "/v1/customers/{public_id}"
      body: "*"
    };
  }

  rpc ListCustomers(ListCustomersRequest) returns (CustomerListResponse) {
    option (google.api.http) = {
      get: "/v1/customers"
    };
  }

  rpc GetCustomerStats(Empty) returns (CustomerStatsResponse) {
    option (google.api.http) = {
      get: "/v1/customers/stats"
    };
  }

  rpc GetCustomerTickets(GetCustomerTicketsRequest) returns (TicketListResponse) {
    option (google.api.http) = {
      get: "/v1/customers/{public_id}/tickets"
    };
  }

  // =========================
  // EVENTS
  // =========================
  rpc CreateEvent(CreateEventRequest) returns (EventResponse) {
    option (google.api.http) = {
      post: "/v1/events"
      body: "*"
    };
  }

  rpc GetEvent(GetEventRequest) returns (EventResponse) {
    option (google.api.http) = {
      get: "/v1/events/{public_id}"
    };
  }

  rpc ListEvents(ListEventsRequest) returns (EventListResponse) {
    option (google.api.http) = {
      get: "/v1/events"
    };
  }

  rpc UpdateEvent(UpdateEventRequest) returns (EventResponse) {
    option (google.api.http) = {
      patch: "/v1/events/{public_id}"
      body: "*"
    };
  }

  // =========================
  // CATEGORIES
  // =========================
  rpc CreateCategory(CreateCategoryRequest) returns (CategoryResponse) {
    option (google.api.http) = {
      post: "/v1/categories"
      body: "*"
    };
  }

  rpc GetEventCategories(GetEventCategoriesRequest) returns (CategoryListResponse) {
    option (google.api.http) = {
      get: "/v1/events/{public_id}/categories"
    };
  }

  // =========================
  // TICKET TYPES
  // =========================
  rpc CreateTicketType(CreateTicketTypeRequest) returns (TicketTypeResponse) {
    option (google.api.http) = {
      post: "/v1/ticket-types"
      body: "*"
    };
  }

  rpc GetTicketType(GetTicketTypeRequest) returns (TicketTypeResponse) {
    option (google.api.http) = {
      get: "/v1/ticket-types/{id}"
    };
  }

  rpc ListTicketTypes(ListTicketTypesRequest) returns (TicketTypeListResponse) {
    option (google.api.http) = {
      get: "/v1/ticket-types"
    };
  }

  rpc UpdateTicketType(UpdateTicketTypeRequest) returns (TicketTypeResponse) {
    option (google.api.http) = {
      patch: "/v1/ticket-types/{id}"
      body: "*"
    };
  }

  rpc DeleteTicketType(DeleteTicketTypeRequest) returns (Empty) {
    option (google.api.http) = {
      delete: "/v1/ticket-types/{id}"
    };
  }

  // =========================
  // TICKETS
  // =========================
  rpc CreateTicket(CreateTicketRequest) returns (TicketResponse) {
    option (google.api.http) = {
      post: "/v1/tickets"
      body: "*"
    };
  }

  rpc ReserveTicket(ReserveTicketRequest) returns (TicketResponse) {
    option (google.api.http) = {
      post: "/v1/tickets/reserve"
      body: "*"
    };
  }

  rpc PurchaseTicket(PurchaseTicketRequest) returns (TicketResponse) {
    option (google.api.http) = {
      post: "/v1/tickets/purchase"
      body: "*"
    };
  }

  rpc CheckInTicket(CheckInTicketRequest) returns (TicketResponse) {
    option (google.api.http) = {
      post: "/v1/tickets/{ticket_id}/checkin"
      body: "*"
    };
  }

  rpc TransferTicket(TransferTicketRequest) returns (TicketResponse) {
    option (google.api.http) = {
      post: "/v1/tickets/{ticket_id}/transfer"
      body: "*"
    };
  }

  rpc ListTickets(ListTicketsRequest) returns (TicketListResponse) {
    option (google.api.http) = {
      get: "/v1/tickets"
    };
  }

  rpc GetUserTickets(GetUserTicketsRequest) returns (TicketListResponse) {
    option (google.api.http) = {
      get: "/v1/users/{user_id}/tickets"
    };
  }

  rpc UpdateTicketStatus(UpdateTicketStatusRequest) returns (TicketResponse) {
    option (google.api.http) = {
      patch: "/v1/tickets/{ticket_id}/status"
      body: "*"
    };
  }

  rpc UpdateTicket(UpdateTicketRequest) returns (TicketResponse) {
    option (google.api.http) = {
      patch: "/v1/tickets/{ticket_id}"
      body: "*"
    };
  }

  rpc GetTicketDetails(GetTicketRequest) returns (TicketResponse) {
    option (google.api.http) = {
      get: "/v1/tickets/{id}"
    };
  }

  rpc GetTicketStats(GetTicketStatsRequest) returns (TicketStatsResponse) {
    option (google.api.http) = {
      get: "/v1/tickets/stats/{event_id}"
    };
  }

  // Expiración de reservas
  rpc ExpireReservations(Empty) returns (ExpireReservationsResponse) {
    option (google.api.http) = {
      post: "/v1/tickets/expire-reservations"
    };
  }
}

// ============ COMMON ============
message Empty {}

message HealthResponse {
  string status = 1;
  string service = 2;
  string version = 3;
  google.protobuf.Timestamp timestamp = 4;
  reserved 100 to 199;
}

// ============ TICKETS ============
message CreateTicketRequest {
  string event_id = 1;
  string user_id = 2;
  string customer_id = 3;
  string ticket_type_id = 4;
  int32 quantity = 5;
}

message ReserveTicketRequest {
  string ticket_type_id = 1;
  string user_id = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message PurchaseTicketRequest {
  string ticket_id = 1;
  string customer_id = 2;
}

message CheckInTicketRequest {
  string ticket_id = 1;
  string checked_by = 2;
  string method = 3;
  string location = 4;
}

message TransferTicketRequest {
  string ticket_id = 1;
  string from_customer_id = 2;
  string to_customer_id = 3;
  string token = 4;
}

message ListTicketsRequest {
  string event_id = 1;
  string customer_id = 2;
  string status = 3;
  string date_from = 4;
  string date_to = 5;
  int32 page = 6;
  int32 page_size = 7;
}

message UpdateTicketRequest {
  string ticket_id = 1;
  optional string attendee_name = 2;
  optional string attendee_email = 3;
  optional string attendee_phone = 4;
  optional string status = 5;
}

message UpdateTicketStatusRequest {
  string ticket_id = 1;
  string status = 2;
  string reason = 3;
}

message GetTicketRequest {
  string id = 1;
}

message GetTicketStatsRequest {
  string event_id = 1;
}

message TicketResponse {
  string ticket_id = 1;
  string status = 2;
  string code = 3;
  string qr_code_url = 4;
  string event_name = 5;
  string event_date = 6;
  string location = 7;
  double price = 8;
  string category_name = 9;
  string seat_number = 10;
  string customer_name = 11;
  string customer_email = 12;
  string user_name = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp used_at = 15;
  reserved 100 to 199;
}

message TicketListResponse {
  repeated TicketResponse tickets = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
  reserved 100 to 199;
}

message TicketStatsResponse {
  int64 total_tickets = 1;
  int64 available_tickets = 2;
  int64 sold_tickets = 3;
  int64 reserved_tickets = 4;
  int64 checked_in_tickets = 5;
  int64 cancelled_tickets = 6;
  int64 refunded_tickets = 7;
  double total_revenue = 8;
  double avg_ticket_price = 9;
  double check_in_rate = 10;
  reserved 100 to 199;
}

// 🔥 NUEVO - Respuesta para expiración
message ExpireReservationsResponse {
  int32 expired_count = 1;
}

// ============ TICKET TYPES ============
message CreateTicketTypeRequest {
  string event_id = 1;
  string name = 2;
  string description = 3;
  string ticket_class = 4;
  double base_price = 5;
  string currency = 6;
  double tax_rate = 7;
  string service_fee_type = 8;
  double service_fee_value = 9;
  int32 total_quantity = 10;
  int32 max_per_order = 11;
  int32 min_per_order = 12;
  google.protobuf.Timestamp sale_starts_at = 13;
  google.protobuf.Timestamp sale_ends_at = 14;
  bool is_active = 15;
  bool requires_approval = 16;
  bool is_hidden = 17;
  string sales_channel = 18;
  string access_type = 19;
  repeated string benefits = 20;
  string validation_rules = 21;
  reserved 100 to 199;
}

message GetTicketTypeRequest {
  string id = 1;
}

message ListTicketTypesRequest {
  string event_id = 1;
  bool is_active = 2;
  int32 page = 3;
  int32 page_size = 4;
  reserved 100 to 199;
}

message UpdateTicketTypeRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
  optional double base_price = 4;
  optional int32 total_quantity = 5;
  optional int32 max_per_order = 6;
  optional int32 min_per_order = 7;
  optional google.protobuf.Timestamp sale_starts_at = 8;
  optional google.protobuf.Timestamp sale_ends_at = 9;
  optional bool is_active = 10;
  optional bool is_hidden = 11;
  reserved 100 to 199;
}

message DeleteTicketTypeRequest {
  string id = 1;
}

message TicketTypeResponse {
  string id = 1;
  string event_id = 2;
  string name = 3;
  string description = 4;
  string ticket_class = 5;
  double base_price = 6;
  string currency = 7;
  double tax_rate = 8;
  int32 total_quantity = 9;
  int32 available_quantity = 10;
  int32 sold_quantity = 11;
  int32 reserved_quantity = 12;
  int32 max_per_order = 13;
  int32 min_per_order = 14;
  google.protobuf.Timestamp sale_starts_at = 15;
  google.protobuf.Timestamp sale_ends_at = 16;
  bool is_active = 17;
  bool is_sold_out = 18;
  repeated string benefits = 19;
  google.protobuf.Timestamp created_at = 20;
  google.protobuf.Timestamp updated_at = 21;
  reserved 100 to 199;
}

message TicketTypeListResponse {
  repeated TicketTypeResponse ticket_types = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
  reserved 100 to 199;
}

// ============ CUSTOMERS ============
message CreateCustomerRequest {
  string name = 1;
  string email = 2;
  string phone = 3;
  string customer_type = 4;
  string source = 5;
  reserved 100 to 199;
}

message GetCustomerRequest {
  string public_id = 1;
}

message UpdateCustomerRequest {
  string public_id = 1;
  optional string name = 2;
  optional string email = 3;
  optional string phone = 4;
  optional string company_name = 5;
  optional bool is_vip = 6;
  optional string customer_type = 7;
  reserved 100 to 199;
}

message ListCustomersRequest {
  bool is_active = 1;
  bool is_vip = 2;
  string country = 3;
  string customer_segment = 4;
  string search = 5;
  string date_from = 6;
  string date_to = 7;
  int32 page = 8;
  int32 page_size = 9;
  reserved 100 to 199;
}

message GetCustomerTicketsRequest {
  string public_id = 1;
}

message CustomerLookup {
  oneof lookup {
    int32 id = 1;
    string public_id = 2;
    string email = 3;
  }
}

message CustomerResponse {
  int32 id = 1;
  string public_id = 2;
  string name = 3;
  string email = 4;
  string phone = 5;
  string customer_type = 6;
  bool is_vip = 7;
  double total_spent = 8;
  int32 total_orders = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  reserved 100 to 199;
}

message CustomerListResponse {
  repeated CustomerResponse customers = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
  reserved 100 to 199;
}

message CustomerStatsResponse {
  int64 total_customers = 1;
  int64 active_customers = 2;
  int64 vip_customers = 3;
  int64 new_customers_last_30_days = 4;
  double total_revenue = 5;
  double avg_lifetime_value = 6;
  repeated CountryStats top_countries = 7;
  reserved 100 to 199;
}

message CountryStats {
  string country = 1;
  int64 count = 2;
  double revenue = 3;
  reserved 100 to 199;
}

// ============ USERS ============
message CreateUserRequest {
  string name = 1;
  string email = 2;
  string password = 3;
  string role = 4;
  reserved 100 to 199;
}

message GetUserRequest {
  string user_id = 1;
}

message UpdateUserRequest {
  string user_id = 1;
  optional string name = 2;
  optional string email = 3;
  optional string phone = 4;
  optional string avatar_url = 5;
  optional string preferred_language = 6;
  optional string preferred_currency = 7;
  optional string timezone = 8;
  reserved 100 to 199;
}

message DeleteUserRequest {
  string user_id = 1;
}

message GetUserTicketsRequest {
  string user_id = 1;
}

message UserLookup {
  string user_id = 1;
}

message UserResponse {
  string user_id = 1;
  string status = 2;
  string name = 3;
  string email = 4;
  string role = 5;
  google.protobuf.Timestamp created_at = 6;
  reserved 100 to 199;
}

// ============ AUTH ============
message LoginRequest {
  string email = 1;
  string password = 2;
  reserved 100 to 199;
}

message LoginResponse {
  string token = 1;
  string refresh_token = 2;
  UserResponse user = 3;
  google.protobuf.Timestamp expires_at = 4;
  reserved 100 to 199;
}

message LogoutRequest {
  string token = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp expires_at = 3;
  reserved 100 to 199;
}

// ============ EVENTS ============
message CreateEventRequest {
  string name = 1;
  string description = 2;
  string short_description = 3;
  string start_date = 4;
  string end_date = 5;
  string location = 6;
  string venue_details = 7;
  string organizer_id = 8;
  string venue_id = 9;
  string primary_category_id = 10;
  repeated string category_ids = 11;
  string timezone = 12;
  string event_type = 13;
  string cover_image_url = 14;
  string banner_image_url = 15;
  string venue_name = 16;
  string address_full = 17;
  string city = 18;
  string state = 19;
  string country = 20;
  string visibility = 21;
  bool is_featured = 22;
  bool is_free = 23;
  int32 max_attendees = 24;
  int32 min_attendees = 25;
  string tags = 26;
  int32 age_restriction = 27;
  bool requires_approval = 28;
  bool allow_reservations = 29;
  int32 reservation_duration = 30;
  reserved 100 to 199;
}

message GetEventRequest {
  string public_id = 1;
}

message UpdateEventRequest {
  string public_id = 1;
  optional string name = 2;
  optional string description = 3;
  optional string short_description = 4;
  optional string start_date = 5;
  optional string end_date = 6;
  optional string location = 7;
  optional string status = 8;
  optional string visibility = 9;
  optional bool is_featured = 10;
  optional bool is_published = 11;
  optional int32 max_attendees = 12;
  optional int32 age_restriction = 13;
  reserved 100 to 199;
}

message ListEventsRequest {
  string name = 1;
  string organizer_id = 2;
  string category_id = 3;
  string status = 4;
  string date_from = 5;
  string date_to = 6;
  string city = 7;
  string country = 8;
  bool is_featured = 9;
  bool is_free = 10;
  string search = 11;
  int32 page = 12;
  int32 page_size = 13;
  reserved 100 to 199;
}

message EventLookup {
  string public_id = 1;
}

message EventResponse {
  string public_id = 1;
  string name = 2;
  string description = 3;
  string short_description = 4;
  string start_date = 5;
  string end_date = 6;
  string location = 7;
  string venue_details = 8;
  string category = 9;
  repeated string tags = 10;
  bool is_active = 11;
  bool is_published = 12;
  string image_url = 13;
  string banner_url = 14;
  int32 max_attendees = 15;
  int32 total_tickets = 16;
  int32 tickets_sold = 17;
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;
  reserved 100 to 199;
  double latitude = 20;
  double longitude = 21;
}

message EventListResponse {
  repeated EventResponse events = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
  reserved 100 to 199;
}

// ============ CATEGORIES ============
message CreateCategoryRequest {
  string event_id = 1;
  string name = 2;
  string description = 3;
  bool is_active = 10;
  reserved 4 to 9, 11, 100 to 199;
}

message GetEventCategoriesRequest {
  string public_id = 1;
}

message CategoryResponse {
  string public_id = 1;
  string event_id = 2;
  string name = 3;
  string description = 4;
  bool is_active = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  reserved 5 to 11, 15 to 99, 100 to 199;
}

message CategoryListResponse {
  repeated CategoryResponse categories = 1;
  string event_name = 2;
  string event_public_id = 3;
  reserved 100 to 199;
}

// ============ LIST USERS ============
message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message UserListResponse {
  repeated UserResponse users = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
  reserved 100 to 199;
}

// ============ ORDERS ============
message CreateOrderRequest {
  string customer_id = 1;
  repeated OrderItem items = 2;
  string customer_email = 3;
  string customer_name = 4;
}

message OrderItem {
  string ticket_type_id = 1;
  int32 quantity = 2;
}

message OrderResponse {
  string public_id = 1;
  string customer_id = 2;
  string status = 3;
  double total_amount = 4;
  string currency = 5;
  repeated TicketResponse tickets = 6;
  google.protobuf.Timestamp created_at = 7;
}

// ============ PAYMENTS ============
message CreatePaymentIntentRequest {
  string order_id = 1;
  string currency = 2;
}

message PaymentIntentResponse {
  string client_secret = 1;
  string payment_intent_id = 2;
  int64 amount = 3;
  string currency = 4;
}

message ProcessOrderRequest {
  string order_id = 1;
}

message CreatePaymentRequest {
  string order_id = 1;
  double amount = 2;
  string currency = 3;
  string payment_method = 4;
  string payment_provider = 5;
  map<string, string> payment_method_details = 6;
  bool save_card = 7;
}

message PaymentProcessingResponse {
  string payment_id = 1;
  string status = 2;
  bool requires_action = 3;
  string action_url = 4;
  string action_type = 5;
  map<string, string> provider_instructions = 6;
  repeated string next_steps = 7;
  google.protobuf.Timestamp estimated_completion = 8;
}

message WebhookRequest {
  string payload = 1;
  string signature_header = 2;
}